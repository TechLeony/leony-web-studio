name: StoryOfUs Email Worker

on:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read

concurrency:
  group: storyofus-email-worker
  cancel-in-progress: false

jobs:
  invoke-email-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Invoke protected StoryOfUs email worker
        env:
          STORYOFUS_EMAIL_WORKER_SECRET: ${{ secrets.STORYOFUS_EMAIL_WORKER_SECRET }}
        run: |
          if [ "${#STORYOFUS_EMAIL_WORKER_SECRET}" -lt 32 ]; then
            echo "StoryOfUs email worker secret is not configured correctly."
            exit 1
          fi

          curl \
            --silent \
            --show-error \
            --fail \
            --output /dev/null \
            --connect-timeout 10 \
            --max-time 45 \
            --request POST \
            --header "Authorization: Bearer ${STORYOFUS_EMAIL_WORKER_SECRET}" \
            "https://leony.tech/api/internal/storyofus/email-worker"
